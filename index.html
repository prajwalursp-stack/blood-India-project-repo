<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blood India</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                <h1>Blood India</h1>
                <p>Welcome to Blood India!.</p>
            </div>
            
            <form action="#" method="POST" class="login-form">
                <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your Mobile number or Email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
                </div>
                
                <div class="form-actions">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                
                <button type="submit" class="login-btn">Login</button>
            </form>
            
            <div class="login-footer">
                <p>Don't have an account? <a href="#">Sign up here</a></p>
            </div>
        </div>
    </div>
</body>
</html>

<div class="logo-container">
    <img src="file:///Users/prajwalurs/Downloads/blood-india-logo.svg" alt="Blood India 🇮🇳" class="top-right-logo">
</div>
